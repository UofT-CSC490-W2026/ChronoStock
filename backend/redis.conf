# ── Memory ────────────────────────────────────────────────────────────────────
# Cap Redis memory usage.
maxmemory 256mb

# LRU eviction policy.
maxmemory-policy allkeys-lru

# ── Persistence ───────────────────────────────────────────────────────────────
save ""
appendonly no

# ── Network ───────────────────────────────────────────────────────────────────
# Only accept connections from this machine.
bind 127.0.0.1

# Default port.
port 6379

# ── Connection limits ─────────────────────────────────────────────────────────
maxclients 100

# ── Timeouts ──────────────────────────────────────────────────────────────────
# Close idle client connections after 5 minutes.
timeout 300

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
logfile ""